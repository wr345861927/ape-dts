[extractor]
db_type=mongo
extract_type=snapshot
url={mongo_extractor_without_auth_url}
username={mongo_extractor_username}
password={mongo_extractor_password}
batch_size=2

[sinker]
db_type=mongo
sink_type=write
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
batch_size=2

[checker]
enable=true
batch_size=2

[filter]
do_dbs=
ignore_dbs=
do_tbs=utf8_error_db.docs
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=1

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
