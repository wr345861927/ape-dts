appenders:
  stdout:
    kind: console

  silent_stdout_appender:
    kind: console
    filters:
      - kind: threshold
        level: off

  check_stdout_appender:
    kind: console
    encoder:
      pattern: "{t} - {m}{n}"

  default_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/default.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} - {level} - [{i}] - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/default{}.log"

  commit_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/commit.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} - {level} - [{i}] - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/commit{}.log"

  position_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/position.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} | {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 1mb
      roller:
        kind: fixed_window
        base: 1
        count: 10
        pattern: "LOG_DIR_PLACEHOLDER/position{}.log"

  monitor_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/monitor.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} | {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/monitor{}.log"

  miss_appender:
    kind: file
    append: true
    path: "CHECK_LOG_DIR_PLACEHOLDER/miss.log"
    filters:
      - kind: size_limit
        path: "CHECK_LOG_DIR_PLACEHOLDER/miss.log"
        limit: CHECK_LOG_FILE_SIZE_PLACEHOLDER
    encoder:
      pattern: "{m}{n}"

  diff_appender:
    kind: file
    append: true
    path: "CHECK_LOG_DIR_PLACEHOLDER/diff.log"
    filters:
      - kind: size_limit
        path: "CHECK_LOG_DIR_PLACEHOLDER/diff.log"
        limit: CHECK_LOG_FILE_SIZE_PLACEHOLDER
    encoder:
      pattern: "{m}{n}"

  sql_appender:
    kind: file
    append: true
    path: "CHECK_LOG_DIR_PLACEHOLDER/sql.log"
    filters:
      - kind: size_limit
        path: "CHECK_LOG_DIR_PLACEHOLDER/sql.log"
        limit: CHECK_LOG_FILE_SIZE_PLACEHOLDER
    encoder:
      pattern: "{m}{n}"

  summary_appender:
    kind: file
    append: true
    path: "CHECK_LOG_DIR_PLACEHOLDER/summary.log"
    encoder:
      pattern: "{m}{n}"

  statistic_appender:
    kind: rolling_file
    append: true
    path: "STATISTIC_LOG_DIR_PLACEHOLDER/statistic.log"
    encoder:
      pattern: "{m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 10
        pattern: "STATISTIC_LOG_DIR_PLACEHOLDER/statistic{}.log"

  finished_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/finished.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} | {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/finished{}.log"

  task_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/task.log"
    encoder:
      pattern: "{m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100kb
      roller:
        kind: delete

  runtime_trace_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/runtime_trace.log"
    encoder:
      pattern: "{m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/runtime_trace{}.log"

  http_appender:
    kind: rolling_file
    append: true
    path: "LOG_DIR_PLACEHOLDER/http.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%6f)(utc)} - {level} - [{i}] - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 1
        pattern: "LOG_DIR_PLACEHOLDER/http{}.log"

loggers:
  mysql_binlog_connector_rust: # crate: mysql-binlog-connector-rust
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - default_appender

  sqlx: # crate: sqlx
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - default_appender

  default_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - default_appender

  commit_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - commit_appender

  position_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - position_appender

  monitor_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - monitor_appender

  miss_logger:
    level: info
    appenders:
      - miss_appender
      - CHECK_RESULT_STDOUT_APPENDER_PLACEHOLDER

  diff_logger:
    level: info
    appenders:
      - diff_appender
      - CHECK_RESULT_STDOUT_APPENDER_PLACEHOLDER

  summary_logger:
    level: info
    appenders:
      - summary_appender
      - CHECK_RESULT_STDOUT_APPENDER_PLACEHOLDER

  statistic_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - statistic_appender

  finished_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - finished_appender

  sql_logger:
    level: info
    appenders:
      - sql_appender
      - CHECK_RESULT_STDOUT_APPENDER_PLACEHOLDER

  task_logger:
    level: LOG_LEVEL_PLACEHOLDER
    appenders:
      - task_appender
    additive: false

  runtime_trace_logger:
    level: info
    appenders:
      - runtime_trace_appender
    additive: false

  http_logger:
    level: info
    appenders:
      - http_appender
    additive: false

  actix_web:
    level: info
    appenders:
      - http_appender
      - RUNTIME_STDOUT_APPENDER_PLACEHOLDER
    additive: false

  actix_server:
    level: info
    appenders:
      - http_appender
      - RUNTIME_STDOUT_APPENDER_PLACEHOLDER
    additive: false

root:
  level: LOG_LEVEL_PLACEHOLDER
  appenders:
    - RUNTIME_STDOUT_APPENDER_PLACEHOLDER
